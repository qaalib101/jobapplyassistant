<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Apply Assistant Context</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Job Apply Assistant</h1>
          <p>Paste the context the AI should use when drafting application answers.</p>
        </div>
        <nav>
          <a href="/demos/">Demos</a>
          <a href="/api/health">API</a>
        </nav>
      </header>

      <section class="panel">
        <label for="contextTitle">Title</label>
        <input id="contextTitle" type="text" value="General AI context" />

        <label for="contextText">AI context</label>
        <textarea
          id="contextText"
          spellcheck="true"
          placeholder="Paste your resume text, career summary, preferred roles, work authorization, compensation preferences, projects, achievements, reusable answers, and anything else the AI should know. Avoid storing sensitive demographic or identity information unless you explicitly want it used."
        ></textarea>

        <div class="actions">
          <div id="status" class="status">Loading saved context...</div>
          <button id="saveButton" type="button">Save context</button>
        </div>
      </section>

      <section class="panel">
        <h2>Resume Workspace</h2>
        <p class="section-copy">Upload a text resume or construct one here. It will be available to the extension side panel.</p>

        <label for="resumeFile">Resume file</label>
        <input id="resumeFile" type="file" accept=".txt,.md,.text" />

        <label for="resumeLabel">Resume label</label>
        <input id="resumeLabel" type="text" value="Base resume" />

        <label for="resumeText">Resume text</label>
        <textarea id="resumeText" spellcheck="true" placeholder="Paste or build the resume you want to use for tailoring."></textarea>

        <div class="actions">
          <div id="resumeStatus" class="status">No resume loaded.</div>
          <button id="saveResumeButton" type="button">Save resume</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
