<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Greenhouse Demo Application</title>
    <link rel="stylesheet" href="/demos/demo.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Software Engineer, Product Platform</h1>
        <p>Greenhouse-style local demo. Buttons do not submit anywhere.</p>
      </header>

      <form>
        <div class="grid">
          <label>
            <span>First Name</span>
            <input name="first_name" autocomplete="given-name" required />
          </label>

          <label>
            <span>Last Name</span>
            <input name="last_name" autocomplete="family-name" required />
          </label>

          <label>
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>

          <label>
            <span>Phone</span>
            <input type="tel" name="phone" autocomplete="tel" />
          </label>

          <label class="full">
            <span>Current Location</span>
            <input name="location" placeholder="City, State" />
          </label>

          <label>
            <span>LinkedIn Profile</span>
            <input type="url" name="linkedin" />
          </label>

          <label>
            <span>Portfolio or GitHub URL</span>
            <input type="url" name="portfolio" />
          </label>

          <label>
            <span>Are you legally authorized to work in the United States?</span>
            <select name="work_authorization">
              <option value="">Select one</option>
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
          </label>

          <label>
            <span>Will you now or in the future require visa sponsorship?</span>
            <select name="sponsorship">
              <option value="">Select one</option>
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
          </label>

          <label class="full">
            <span>Why are you interested in this role?</span>
            <textarea name="interest"></textarea>
          </label>
        </div>

        <div class="actions">
          <a class="button secondary" href="/demos/">Back</a>
          <button type="button">Review Application</button>
        </div>
      </form>
    </main>
  </body>
</html>
