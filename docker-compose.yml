services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jobapplyassistant
      POSTGRES_USER: jobapply
      POSTGRES_PASSWORD: jobapply_dev
    ports:
      - "5433:5432"
    volumes:
      - jobapply_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobapply -d jobapplyassistant"]
      interval: 5s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
    environment:
      BACKEND_UPSTREAM: host.docker.internal:4317
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  jobapply_postgres:
