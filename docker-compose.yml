services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jobapplyassistant
      POSTGRES_USER: jobapply
      POSTGRES_PASSWORD: jobapply_dev
    ports:
      - "5433:5432"
    volumes:
      - jobapply_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobapply -d jobapplyassistant"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:22-alpine
    working_dir: /app
    env_file:
      - .env
    environment:
      PORT: 4317
      DATABASE_URL: postgres://jobapply:jobapply_dev@postgres:5432/jobapplyassistant
      PUBLIC_BASE_URL: http://jobapply.localhost:8080
    command: >
      sh -c "npm ci &&
      npx prisma generate &&
      npm run build:frontend &&
      npm run db:migrate &&
      npx tsx apps/backend/src/server.ts"
    ports:
      - "4317:4317"
    volumes:
      - ./:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
    environment:
      BACKEND_UPSTREAM: backend:4317
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend

volumes:
  jobapply_postgres:
  backend_node_modules:
